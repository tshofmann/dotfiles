# ============================================================
# validate.yml - GitHub Actions Workflow
# ============================================================
# Zweck   : Validiert Shell-Syntax, Dokumentation und Alias-Format
# Trigger : Push auf main, PRs nach main, manuell
# Checks  : 11 von 12 Pre-Commit-Checks (siehe .github/hooks/pre-commit)
# Diff    : Health-Check (#9) fehlt – prüft reale Installation
#           (Symlinks, Homebrew, Fonts), die in CI nicht existiert.
# ============================================================

name: Dokumentation validieren

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manuelles Triggern ermöglichen

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # ubuntu-latest: Alle Checks sind Linux-kompatibel (kein macOS-API nötig).
    # Vorher macos-latest (10× teurer), jetzt ubuntu-latest für maximale
    # Kosteneffizienz + Linux-Validierung. Siehe #329.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ZSH installieren
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: ZSH-Syntax prüfen
        shell: zsh {0}
        run: |
          set -uo pipefail
          echo "Prüfe ZSH-Syntax (inkl. Alias-Dateien)..."
          errors=0
          for file in .github/scripts/**/*.sh(N) terminal/.config/alias/*.alias(N) terminal/.config/fzf/*(N) terminal/.config/**/*.zsh(N) terminal/.zsh*(N) terminal/.zprofile(N) terminal/.zlogin(N) setup/bootstrap.sh(N) setup/restore.sh(N) setup/modules/*.sh(N); do
            if [[ -f "$file" ]]; then
              # fzf config ist kein Shell-Skript
              [[ "${file:t}" == "config" ]] && continue
              if ! zsh -n "$file" 2>/dev/null; then
                echo "✖ Syntax-Fehler: $file"
                zsh -n "$file" 2>&1 | head -3
                (( errors++ )) || true
              fi
            fi
          done
          if (( errors > 0 )); then
            echo "✖ $errors Datei(en) mit Syntax-Fehlern"
            exit 1
          fi
          echo "✔ Shell-Syntax OK"

      - name: Generator Unit Tests
        shell: zsh {0}
        run: ./.github/scripts/tests/run-all.sh

      - name: header-wrap Selbsttests
        shell: zsh {0}
        run: |
          set -uo pipefail
          helper="terminal/.config/fzf/header-wrap"
          if [[ ! -x "$helper" ]]; then
            echo "✖ header-wrap nicht gefunden oder nicht ausführbar"
            exit 1
          fi
          "$helper" --test

      - name: POSIX-Syntax prüfen
        shell: bash
        run: |
          echo "Prüfe POSIX-Shell-Syntax..."
          errors=0
          for file in setup/install.sh setup/lib/logging.sh; do
            if [[ -f "$file" ]]; then
              if ! sh -n "$file" 2>/dev/null; then
                echo "✖ Syntax-Fehler: $file"
                sh -n "$file" 2>&1 | head -3
                errors=$((errors + 1))
              fi
            fi
          done
          if [[ $errors -gt 0 ]]; then
            echo "✖ $errors POSIX-Datei(en) mit Syntax-Fehlern"
            exit 1
          fi
          echo "✔ POSIX-Syntax OK"

      - name: Execute-Berechtigungen prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-executable-permissions.sh

      - name: Plattform-Sync prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-platform-sync.sh

      - name: Brewfile-Mapping prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-brewfile-mapping.sh

      - name: tealdeer installieren
        run: |
          echo "Installiere tealdeer v1.8.1..."
          curl -fsSL "https://github.com/tealdeer-rs/tealdeer/releases/download/v1.8.1/tealdeer-linux-x86_64-musl" \
            -o /tmp/tldr
          # SHA256-Verifizierung (offizielle Checksum von GitHub Releases)
          echo "6f2fad4435e0110484d3f25cdc4bf20129dae03238f32d06ebdd00bdc50ae2ed  /tmp/tldr" | sha256sum -c
          sudo install -m 755 /tmp/tldr /usr/local/bin/tldr
          tldr --version
          echo "✔ tealdeer installiert"

      - name: tealdeer Cache initialisieren
        run: |
          echo "Initialisiere tealdeer Cache für tldr-Patch/Page-Erkennung..."
          tldr --update
          echo "✔ tealdeer Cache bereit"

      - name: Dokumentation prüfen
        run: |
          echo "Prüfe ob Dokumentation aktuell ist..."
          if ! ./.github/scripts/generate-docs.sh --check; then
            echo ""
            echo "✖ Dokumentation ist veraltet!"
            echo ""
            echo "Bitte lokal ausführen:"
            echo "  ./.github/scripts/generate-docs.sh --generate"
            echo ""
            exit 1
          fi
          echo "✔ Dokumentation ist aktuell"

      - name: Alias-Format prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-alias-format.sh

      - name: Header-Einrückungen prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-header-alignment.sh

      - name: Keybinding-Sync prüfen
        shell: zsh {0}
        run: ./.github/scripts/check-header-sync.sh

      - name: Markdown prüfen
        run: |
          echo "Prüfe Markdown-Dateien..."
          # Config aus terminal/.config/ (wird lokal via Stow verlinkt)
          # markdownlint-cli2 via npx – Node.js auf ubuntu-latest vorinstalliert
          npx --yes markdownlint-cli2@0.21.0 --config terminal/.config/markdownlint-cli2/.markdownlint-cli2.jsonc '**/*.md' '#node_modules'
          echo "✔ Markdown OK"
