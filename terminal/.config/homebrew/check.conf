# ============================================================
# check.conf - Homebrew Outdated-Check Konfiguration
# ============================================================
# Zweck       : Einstellungen für automatische Paket-Prüfung
# Pfad        : ~/.config/homebrew/check.conf
# Hinweis     : Geladen von ~/.config/alias/brew.alias
#               State: ${XDG_STATE_HOME:-~/.local/state}/homebrew (maschinenlokal)
# ============================================================

# Prüf-Intervall in Sekunden (Standard: 86400 = 24h)
_BREW_CHECK_INTERVAL=86400

# Benachrichtigungskanal: auto | desktop | terminal | off
# auto     = Desktop-Notification wenn verfügbar, sonst Terminal
# desktop  = Nur Desktop-Notification (kein Fallback)
# terminal = Nur Terminal-Meldung
# off      = Keine Benachrichtigungen
_BREW_CHECK_NOTIFY=auto

# Benachrichtigungs-Titel und Meldung
# {count} wird durch die Anzahl veralteter Pakete ersetzt
_BREW_CHECK_TITLE='🍺 Homebrew'
_BREW_CHECK_MESSAGE='{count} Updates verfügbar – Zeit für brew-up'
